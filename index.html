<!DOCTYPE html>

<style>





.row{
    position:relative;
    z-index:1;

    background:linear-gradient(90deg,#111,#1a1f2b);
    border-left:5px solid #333;
    border-radius:10px;

    margin:12px 0; /* ✅ spacing fix */
}

/* GLOW */
.row::after{
    content:"";
    position:absolute;
    inset:-2px; /* not too big */
    border-radius:12px;
    pointer-events:none;
    opacity:0;
    z-index:-1; /* ✅ ALWAYS behind */
}

/* NEXT should be top */
.next{
    z-index:5;
}


/* ===== NEXT BOSS (BLUE GLOW) ===== */
.next::after{
    box-shadow:
        0 0 12px #00e5ff,
        0 0 30px #00e5ff,
        0 0 55px #00e5ff;
    opacity:1;
}

.next{
    z-index:5; /* 🔥 only top highlight wins */
}

/* ===== ALIVE (GREEN BLINK) ===== */
.alive::after{
    box-shadow:
        0 0 10px #00ff9c,
        0 0 25px #00ff9c,
        0 0 45px #00ff9c;
    animation:glowGreen 1.2s infinite ease-in-out;
}

/* ===== TODAY (SOFT YELLOW) ===== */
.today::after{
    box-shadow:
        0 0 10px #ffd54f,
        0 0 20px #ffd54f;
    opacity:0.6;
}

/* ===== SOON (RED BLINK) ===== */
/* 🔴 STATIC RED (DEFAULT) */
.row.soon::after{
    box-shadow:
        0 0 10px #ff4d4d,
        0 0 25px #ff4d4d,
        0 0 45px #ff4d4d;
}

/* 🔴 BLINK ONLY WHEN .blink IS ALSO PRESENT */
.row.soon.blink::after{
    animation:glowRed 1s infinite ease-in-out;
}

/* ✅ ADD THIS RIGHT HERE 👇 */
.today-row{
    position:relative;
    z-index:1;
}

.today-row.soon::after{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:12px;
    pointer-events:none;

    box-shadow:
        0 0 10px #ff4d4d,
        0 0 25px #ff4d4d,
        0 0 45px #ff4d4d;

    opacity:1;
}

.today-row.soon.blink::after{
    animation:glowRed 1s infinite ease-in-out;
}
/* ===== ANIMATIONS ===== */
@keyframes glowGreen{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

@keyframes glowRed{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

 /* ✅ fixed widths */

/* BLINK */

/* COLUMNS */

/* INPUT */
input{
    background:#111;

<script>



// ===== GlOBAL STORAGE =====
let bossData = {};

// 🔔 NOTIFICATION SYSTEM
let notifiedBosses = {};

// call once when page loads
requestNotificationPermission();


// ===== DATA =====
const dynamicBosses = [
{ name:"Venatus", h:10 },{ name:"Viorent", h:10 },
{ name:"Ego", h:21 },{ name:"Livera", h:24 },
{ name:"Araneo", h:24 },{ name:"Undomiel", h:24 },

const fixedBosses = [

["Saphirus",[["Sunday","17:00"],["Tuesday","11:30"]]],
["Thymele",[["Monday","19:00"],["Wednesday","11:30"]]],
["Auraq",[["Friday","22:00"],["Wednesday","21:00"]]],
["Ringor",[["Saturday","17:00"]]],
["Roderick",[["Friday","19:00"]]],
["Milavy",[["Saturday","15:00"]]],
["Chaiflock",[["Saturday","22:00"]]],
["Benji",[["Sunday","21:00"]]],
["Libitina",[["Monday","21:00"],["Saturday","21:00"]]],
["Rakajeth",[["Tuesday","22:00"],["Sunday","19:00"]]],
["Tumier",[["Sunday","19:00"]]]
];

const kransiaBosses = [
["Icaruthia",[["Tuesday","21:00"],["Friday","21:00"]]],
["Motti",[["Wednesday","19:00"],["Saturday","19:00"]]],
["Nevaeh",[["Sunday","22:00"]]]
];

const DAY_MAP = {Sunday:0,Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6};

// ===== STORAGE =====
function saveTOD(name, value){

    if(!currentUser){
        alert("Login first!");
        return;
    }

    // SAVE TOD
    db.ref("bosses/" + name).set(value);

    // 🔥 SAVE LOG
    db.ref("logs").push({
        boss: name,
        tod: value,
        editedBy: currentUser,
        role: userRole,
        time: new Date().toISOString()
    });
}

function loadTOD(name){
    return bossData[name] || "";
}

function formatTODDisplay(tod){
    if(!tod) return "--";

    let d = new Date(tod);

    if(isNaN(d)) return "--";

    let date = d.toLocaleDateString("en-US", {
        month: "short",
        day: "numeric",
        timeZone: selectedTZ
    });

    let time = d.toLocaleTimeString("en-US", {
        hour: "2-digit",
        minute: "2-digit",
        timeZone: selectedTZ
    });

    return `${date} • ${time}`;

}

function playBeep(times = 3){
    if(!audioCtx) return;

    for(let i = 0; i < times; i++){
        setTimeout(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = "square"; // sharper/louder
            osc.frequency.value = 1000;

            gain.gain.value = 1; // 🔊 volume (0.5–1 = loud)

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15); // short beep
        }, i * 200); // spacing between beeps
    }
}


let currentUser = null;
let userRole = "viewer";

function loginAdmin(){
    let name = prompt("Enter your name:");
    let pass = prompt("Enter password:");

    db.ref("users/" + name).once("value").then(snap => {

        console.log("USER DATA:", user);

            // 🔥 allow edit if admin OR elite
            isAdmin = (userRole === "admin" || userRole === "elite");

            // 🔁 rebuild UI
            document.getElementById("dynamic").innerHTML = "";
            document.getElementById("fixed").innerHTML = "";
            document.getElementById("kransia").innerHTML = "";

            build("DYNAMIC BOSSES", dynamicBosses.map(b=>({...b,type:"dyn"})), dynamic, true);
            build("FIXED TIMER", fixedBosses.map(([n,t])=>({name:n,times:t,type:"fix"})), fixed);
            build("KRANSIA", kransiaBosses.map(([n,t])=>({name:n,times:t,type:"fix"})), kransia);

            update();

        }else{
            alert("Invalid login");
        }
    });
}

// ===== CALC =====
function nextInterval(tod, h){
    if(!tod) return null;

    let now = new Date();
    let d = new Date(tod);

    // 🚨 invalid date protection
    if(isNaN(d.getTime())) return null;

    let interval = h * 3600000;

    let r = new Date(d);

    // 🔥 LOOP instead of math (more accurate)
    while(r <= now){
        r = new Date(r.getTime() + interval);
    }

    return r;
}


function nextSchedule(times){

    let now = new Date();
    let aliveWindow = 5 * 60 * 1000; // 5 minutes

    let allTimes = times.map(([day, t]) => {

        let [h, m] = t.split(":");
        let d = new Date();

        let diff = DAY_MAP[day] - d.getDay();
        if (diff < 0) diff += 7;

        d.setDate(d.getDate() + diff);
        d.setHours(h, m, 0, 0);

        return d;
    });

    // sort ascending
    allTimes.sort((a, b) => a - b);

    for (let t of allTimes) {

    let diff = now - t;

    // ✅ STAY on current spawn while ALIVE
    if (diff >= 0 && diff <= aliveWindow) {
        return t;
    }

    // ❗ DO NOT jump immediately if just passed
    if (diff < 0) {
        return t;
    }
}

    // ✅ ALL PASSED → next week
    let nextWeek = new Date(allTimes[0]);
    nextWeek.setDate(nextWeek.getDate() + 7);

    return nextWeek;
}


    

function format(d){
    return d.toLocaleString("en-US",{
        weekday:"short",
        month:"short",
        day:"numeric",
        hour:"2-digit",
        minute:"2-digit",
        timeZone: selectedTZ
    });
}

function cd(n){
    if(!n) return "--";
    let diff=(n-new Date())/1000;
    if(diff<=0) return "ALIVE";
    let h=Math.floor(diff/3600);
    let m=Math.floor(diff%3600/60);
    let s=Math.floor(diff%60);
    return `${h}h ${m}m ${s}s`;
}

// ===== BUILD =====
function build(title,data,container,isDynamic=false){

    container.innerHTML += `<div class="section-title">${title}</div>`;

    data.forEach(b=>{
        let row=document.createElement("div");
        row.className="row";
        row.id="row_"+b.name;

        row.innerHTML = `
        <div class="name">${b.name}</div>
        <div class="status" id="s_${b.name}">--</div>
        <div class="respawn" id="r_${b.name}">--</div>
        <div class="cd" id="c_${b.name}">--</div>
        <div class="tod">
            ${isDynamic && isAdmin ? `<input type="datetime-local"
    id="tod_${b.name}"
    value="${loadTOD(b.name)}"
    onchange="saveTOD('${b.name}',this.value)">` : "--"}
        </div>
       ${isDynamic && isAdmin ? `
    <button onclick="setNow('${b.name}')">Killed Now</button>
` : ""}
        `;

        container.appendChild(row);
    });
}

build("DYNAMIC BOSSES",dynamicBosses.map(b=>({...b,type:"dyn"})),dynamic,true);
build("FIXED TIMER",fixedBosses.map(([n,t])=>({name:n,times:t,type:"fix"})),fixed);
build("KRANSIA",kransiaBosses.map(([n,t])=>({name:n,times:t,type:"fix"})),kransia);

// ===== NOW BUTTON =====
function setNow(name){
    let d = new Date();

    let year = d.getFullYear();
    let month = String(d.getMonth()+1).padStart(2,"0");
    let day = String(d.getDate()).padStart(2,"0");
    let hour = String(d.getHours()).padStart(2,"0");
    let min = String(d.getMinutes()).padStart(2,"0");

    let value = `${year}-${month}-${day}T${hour}:${min}`;

    saveTOD(name, value);
}


// ===== UPDATE =====
function update(){

let allBosses = [];
let todayList = [];
let today = new Date().getDay();

[
    ...dynamicBosses.map(b => ({
    ...b,
    type: "dyn"
})),
    ...fixedBosses.map(([n,t]) => ({ name:n, times:t, type:"fix" })),
    ...kransiaBosses.map(([n,t]) => ({ name:n, times:t, type:"fix" }))
]

.forEach(b => {

    let n;

if(b.type === "dyn"){
    let tod = loadTOD(b.name);
n = nextInterval(tod, b.h);
}else{
    n = nextSchedule(b.times);
}

if(n){
    allBosses.push({name:b.name, time:n});
}

    let row=document.getElementById("row_"+b.name);
    row.classList.remove("alive","today","soon","next","blink");


    let diff=n?(n-new Date())/1000:null;
    


if(n){
    let aliveWindow = 1800;

    let showToday = false;
    let hoursLeft = diff / 3600;

    if(diff <= 0 && diff >= -aliveWindow){
    status = "ALIVE";
    row.classList.add("alive");
    showToday = true;

    // 🔊 PLAY BEEP ON SPAWN (ONLY ONCE)
    if(!notifiedBosses[b.name + "_alive"]){
        playBeep(3);
        notifiedBosses[b.name + "_alive"] = true;
    }
}
else if(diff > 0 && diff <= 300){
    status = "SOON";
    row.classList.add("soon");
    showToday = true;
}
else if(n.toDateString() === new Date().toDateString()){
    status = "TODAY";
    row.classList.add("today");
    showToday = true;
}
else if(n.toDateString() === new Date(Date.now() + 86400000).toDateString()){
    status = "TOMORROW"; // 👈 PASTE HERE
    row.classList.add("tomorrow");
}
else if(hoursLeft <= 24 && hoursLeft > 0){
    status = "SOON";
}
else{
    status = "SCHEDULED"; // 👈 best choice
}

    // ✅ ONLY ONE PUSH
    if(showToday && n.toDateString() === new Date().toDateString()){

        todayList.push({
            name: b.name,
            time: n,
            status: status,
            diff: diff
        });
    }


}

    let sEl = document.getElementById("s_"+b.name);
sEl.innerText = status;
sEl.className = "status " + status.toLowerCase();

let respawnEl = document.getElementById("r_"+b.name);

// ALWAYS show respawn
let respawnText = (n && !isNaN(n)) ? format(n) : "--";

// ✅ ONE clean condition only
if(b.type === "dyn" && (status === "TODAY" || status === "SOON" || status === "ALIVE")){
    
    let tod = formatTODDisplay(loadTOD(b.name));


    respawnEl.innerHTML = `
    <div>${respawnText}</div>
    <div style="font-size:11px; color:#00e5ff; opacity:0.8;">
        TOD: ${tod}
    </div>
    <div id="log_${b.name}" style="font-size:10px; color:#aaa; opacity:0.7;">
        loading...
    </div>
`;

let logEl = document.getElementById("log_" + b.name);
let log = bossLogs[b.name];

if(logEl){
    if(log){
        let time = new Date(log.time).toLocaleTimeString("en-US", {
            hour: "2-digit",
            minute: "2-digit"
        });

        logEl.innerText = `by ${log.editedBy} • ${time}`;
    }else{
        logEl.innerText = "--";
    }
}


}else{
    respawnEl.innerText = respawnText;
}

// 🔔 BEEP LOGIC (FIXED & RELIABLE)
if(n){

    let diffMs = n - new Date();
    let minutesLeft = diffMs / 60000;

    // 🔊 trigger between 5:00 minutes
    if(minutesLeft <= 5 && minutesLeft > 0 && !b.alerted){
        playBeep(3);
        b.alerted = true;
    }

// 🔊 BEEP FUNCTION (UPDATE YOUR EXISTING ONE)
function playBeep(times = 1){
    if(!audioCtx || !soundEnabled) return;

    for(let i = 0; i < times; i++){
        setTimeout(() => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.frequency.value = 1200;
            gain.gain.value = volumeLevel;

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }, i * 200);
    }
}
