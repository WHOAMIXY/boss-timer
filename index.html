<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boss Respawn Timer</title>

<style>

/* ===== OUTER GLOW EFFECT (FIXED) ===== */
.row{
    position:relative;
    overflow:visible; /* IMPORTANT (was hidden before) */
    z-index:1;
}

/* GLOW LAYER */
.row::after{
    content:"";
    position:absolute;
    inset:-2px; /* pushes glow OUTSIDE */
    border-radius:12px;
    pointer-events:none;
    opacity:0;
    z-index:-1;
}


/* ===== NEXT BOSS (BLUE GLOW) ===== */
.next::after{
    box-shadow:
        0 0 12px #00e5ff,
        0 0 30px #00e5ff,
        0 0 55px #00e5ff;
    opacity:1;
}

/* ===== ALIVE (GREEN BLINK) ===== */
.alive::after{
    box-shadow:
        0 0 10px #00ff9c,
        0 0 25px #00ff9c,
        0 0 45px #00ff9c;
    animation:glowGreen 1.2s infinite ease-in-out;
}

/* ===== TODAY (SOFT YELLOW) ===== */
.today::after{
    box-shadow:
        0 0 10px #ffd54f,
        0 0 20px #ffd54f;
    opacity:0.6;
}

/* ===== SOON (RED BLINK) ===== */
.soon::after{
    box-shadow:
        0 0 10px #ff4d4d,
        0 0 25px #ff4d4d,
        0 0 45px #ff4d4d;
    animation:glowRed 1s infinite ease-in-out;
}

/* ===== ANIMATIONS ===== */
@keyframes glowGreen{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

@keyframes glowRed{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

/* ===== GLOBAL ===== */
body{
    margin:0;
    background:#0b0e14;
    font-family:'Segoe UI','Inter',sans-serif;
    color:#eee;
    display:flex;
    justify-content:center;
}

.container{
    width:950px;
    padding:20px;
}

/* ===== HEADER ===== */
.header{
    text-align:center;
    margin-bottom:20px;
}

.logo{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;

    /* CLEAN BACKGROUND LOOK */
    background:#ffffff;
    padding:6px;

    /* SHADOW + GLOW */
    box-shadow:
        0 0 20px rgba(0,0,0,0.7),
        0 0 30px rgba(0,229,255,0.15);

    /* SHARPNESS BOOST */
    filter: contrast(1.15) brightness(1.05) saturate(1.1);

    transition:0.3s;
}

.logo:hover{
    transform:scale(1.05);
    box-shadow:
        0 0 25px rgba(0,0,0,0.9),
        0 0 40px rgba(0,255,156,0.25);
}

.guild{
    margin-top:10px;
    font-size:22px;
    letter-spacing:2px;
    font-weight:600;
}

.subguild{
    font-size:13px;
    color:#aaa;
    letter-spacing:2px;
}

h1{
    text-align:center;
    margin:20px 0;
    letter-spacing:3px;
}

/* ===== TODAY BOX ===== */
.today-box{
    background:linear-gradient(90deg,#111,#1a1f2b);
    border-left:5px solid #ffd54f;
    border-radius:12px;
    padding:15px;
    margin-bottom:20px;
}

/* ===== GRID ===== */
.row, .today-row, .today-header{
    display:grid;
    grid-template-columns: 180px 100px 180px 150px 120px auto;
    gap:10px;
    align-items:center;
    padding:10px;
}

/* HEADER */
.today-header{
    font-size:12px;
    color:#888;
}

/* ROW */
.row{
    background:linear-gradient(90deg,#111,#1a1f2b);
    border-left:5px solid #333;
    border-radius:10px;
    margin:6px 0;
}

/* TODAY ROW */
.today-row{
    background:rgba(255,255,255,0.03);
    border-left:5px solid #ffd54f;
    border-radius:8px;
    margin:4px 0;
}

/* STATUS COLORS */
.alive{ border-left-color:#00ff9c; }
.today{ border-left-color:#ffd54f; }
.soon{ border-left-color:#ff4d4d; }

/* STATUS TEXT */
.status.alive{ color:#00ff9c; }
.status.today{ color:#ffd54f; }
.status.soon{ color:#ff4d4d; }
.status.wait{ color:#aaa; }
.status.set{ color:#888; }

/* BLINK */
.blink{
    animation:blink 1s infinite;
}
@keyframes blink{
    50%{opacity:0.4;}
}

/* COLUMNS */
.name{ color:#00e5ff; font-weight:500; }
.respawn{ color:#ccc; }
.cd{ color:#00ff9c; }

/* INPUT */
input{
    background:#111;
    border:1px solid #333;
    color:white;
    padding:4px;
    border-radius:4px;
}

button{
    background:#222;
    border:none;
    color:white;
    padding:5px 8px;
    border-radius:5px;
    cursor:pointer;
}

.section-title{
    margin-top:20px;
    font-size:12px;
    color:#888;
    letter-spacing:2px;
}


/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px){

    .container{
        width:100%;
        padding:10px;
    }

    .logo{
        width:90px;
        height:90px;
    }

    h1{
        font-size:20px;
        letter-spacing:1px;
    }

    /* STACK LAYOUT */
    .row, .today-row{
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto auto;
        gap:6px;
        font-size:12px;
    }

    .today-header{
        display:none; /* hide header on mobile */
    }

    /* COLUMN REORDER */
    .name{ grid-column:1 / span 2; font-size:14px; }
    .status{ grid-column:1; }
    .respawn{ grid-column:2; }
    .cd{ grid-column:1; }
    .tod{ grid-column:2; }

    button{
        grid-column:1 / span 2;
        width:100%;
    }
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <!-- 🔥 PUT YOUR LOGO FILE HERE -->
    <img src="logo.png" class="logo">
    <div class="guild">TK义</div>
    <div class="subguild">DISHONOR / EXTINCTION / EXODUS</div>
</div>

<h1>BOSS RESPAWN TIMER</h1>

<div id="todayBox" class="today-box"></div>

<div id="dynamic"></div>
<div id="fixed"></div>
<div id="kransia"></div>

</div>

<script>
// ================= GLOBAL =================
let bossData = {};
let bossDead = {};

// ================= DATA =================
const dynamicBosses = [
{ name:"Venatus", h:10 },{ name:"Viorent", h:10 },
{ name:"Ego", h:21 },{ name:"Livera", h:24 },
{ name:"Araneo", h:24 },{ name:"Undomiel", h:24 },
{ name:"LadyDalia", h:18 },{ name:"GeneralAquleus", h:29 },
{ name:"Amentis", h:29 },{ name:"BaronBraudmore", h:32 },
{ name:"Wannitas", h:48 },{ name:"Metus", h:48 },
{ name:"Duplican", h:48 },{ name:"Shuliar", h:35 },
{ name:"Gareth", h:32 },{ name:"Titore", h:37 },
{ name:"Larba", h:35 },{ name:"Catena", h:35 },
{ name:"Secreta", h:62 },{ name:"Ordo", h:62 },
{ name:"Asta", h:62 },{ name:"Supore", h:62 }
];

const fixedBosses = [
["Neutro",[["Tuesday","19:00"],["Thursday","11:30"]]],
["Clemantis",[["Monday","11:30"],["Thursday","19:00"]]],
["Saphirus",[["Sunday","17:00"],["Tuesday","11:30"]]],
["Thymele",[["Monday","19:00"],["Wednesday","11:30"]]],
["Auraq",[["Friday","22:00"],["Wednesday","21:00"]]],
["Roderick",[["Friday","19:00"]]],
["Milavy",[["Saturday","15:00"]]],
["Chaiflock",[["Saturday","22:00"]]],
["Benji",[["Sunday","21:00"]]],
["Libitina",[["Monday","21:00"],["Saturday","21:00"]]],
["Rakajeth",[["Tuesday","22:00"],["Sunday","19:00"]]],
["Tumier",[["Sunday","19:00"]]]
];

const kransiaBosses = [
["Icaruthia",[["Tuesday","21:00"],["Friday","21:00"]]],
["Motti",[["Wednesday","19:00"],["Saturday","19:00"]]],
["Nevaeh",[["Sunday","22:00"]]]
];

const DAY_MAP = {Sunday:0,Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6};

// ================= STORAGE =================
function saveTOD(name, value){
    db.ref("bosses/" + name).set(value);
}
function loadTOD(name){
    return bossData[name] || "";
}
function markDead(name){
    db.ref("bossesDead/" + name).set(Date.now());
}

// ================= CALC =================
function nextInterval(tod,h){
    if(!tod.includes(":")) return null;

    let now=new Date();
    let [t,ap]=tod.split(" ");
    let [hh,mm]=t.split(":");

    hh=parseInt(hh);
    if(ap==="PM" && hh!=12) hh+=12;
    if(ap==="AM" && hh==12) hh=0;

    let d=new Date();
    d.setHours(hh,mm,0);

    let r=new Date(d.getTime()+h*3600000);
    while(r<now) r=new Date(r.getTime()+h*3600000);

    return r;
}

// 🔥 FIXED WITH DEAD SYSTEM
function nextSchedule(times, name){
    let now=new Date();
    let lastKill = bossDead[name] || 0;

    let list = times.map(([day,t])=>{
        let [h,m]=t.split(":");
        let d=new Date();

        let diff=DAY_MAP[day]-d.getDay();
        if(diff<0) diff+=7;

        d.setDate(d.getDate()+diff);
        d.setHours(h,m,0);

        return d;
    });

    list.sort((a,b)=>a-b);

    for(let d of list){
        if(d.getTime() > lastKill && d > now){
            return d;
        }
    }

    let d=list[0];
    d.setDate(d.getDate()+7);
    return d;
}

function format(d){
    return d.toLocaleString("en-US",{weekday:"short",hour:"2-digit",minute:"2-digit"});
}

function cd(n){
    if(!n) return "--";
    let diff=(n-new Date())/1000;
    if(diff<=0) return "ALIVE";
    let h=Math.floor(diff/3600);
    let m=Math.floor(diff%3600/60);
    let s=Math.floor(diff%60);
    return `${h}h ${m}m ${s}s`;
}

// ================= BUILD =================
function build(title,data,container,isDynamic=false,isFixed=false){

    container.innerHTML += `<div class="section-title">${title}</div>`;

    data.forEach(b=>{
        let row=document.createElement("div");
        row.className="row";
        row.id="row_"+b.name;

        row.innerHTML = `
        <div class="name">${b.name}</div>
        <div class="status" id="s_${b.name}">--</div>
        <div class="respawn" id="r_${b.name}">--</div>
        <div class="cd" id="c_${b.name}">--</div>
        <div class="tod">
            ${isDynamic ? `<input id="tod_${b.name}" value="${loadTOD(b.name)}" onchange="saveTOD('${b.name}',this.value)">` : "--"}
        </div>
        ${
            isDynamic 
            ? `<button onclick="setNow('${b.name}')">Now</button>` 
            : isFixed 
            ? `<button onclick="markDead('${b.name}')">DEAD</button>` 
            : ""
        }
        `;

        container.appendChild(row);
    });
}

// ================= BUILD CALL =================
build("DYNAMIC BOSSES",dynamicBosses.map(b=>({...b,type:"dyn"})),dynamic,true);
build("FIXED TIMER",fixedBosses.map(([n,t])=>({name:n,times:t,type:"fix"})),fixed,false,true);
build("KRANSIA",kransiaBosses.map(([n,t])=>({name:n,times:t,type:"fix"})),kransia,false,true);

// ================= NOW =================
function setNow(name){
    let d=new Date();
    let h=d.getHours();
    let m=d.getMinutes().toString().padStart(2,"0");
    let ap=h>=12?"PM":"AM";
    h=h%12||12;
    saveTOD(name,`${h}:${m} ${ap}`);
}

// ================= UPDATE =================
function update(){

let allBosses = [];
let todayList=[];
let today=new Date().getDay();

[...dynamicBosses.map(b=>({...b,type:"dyn"})),
 ...fixedBosses.map(([n,t])=>({name:n,times:t,type:"fix"})),
 ...kransiaBosses.map(([n,t])=>({name:n,times:t,type:"fix"}))]

.forEach(b=>{

    let n;

    if(b.type === "dyn"){
        let tod = loadTOD(b.name);
        n = nextInterval(tod, b.h);
    }else{
        n = nextSchedule(b.times, b.name);
    }

    if(n){
        allBosses.push({name:b.name, time:n});
    }

    let row=document.getElementById("row_"+b.name);
    row.classList.remove("alive","today","soon","next");

    let diff=n?(n-new Date())/1000:null;
    let status="SET";

    if(n){
        if(diff<=0){ status="ALIVE"; row.classList.add("alive"); }
        else if(diff<=300){ status="SOON"; row.classList.add("soon"); }
        else if(n.getDay()===today){ status="TODAY"; row.classList.add("today"); todayList.push({name:b.name,time:n}); }
        else{ status="WAIT"; }
    }

    let sEl=document.getElementById("s_"+b.name);
    sEl.innerText=status;
    sEl.className="status "+status.toLowerCase();

    document.getElementById("r_"+b.name).innerText=n?format(n):"--";
    document.getElementById("c_"+b.name).innerText=cd(n);

});

// NEXT highlight
allBosses.sort((a,b)=>a.time-b.time);
if(allBosses.length > 0){
    let nextBoss = allBosses[0];
    let nextRow = document.getElementById("row_" + nextBoss.name);
    if(nextRow) nextRow.classList.add("next");
}

// TODAY PANEL
let box=document.getElementById("todayBox");

box.innerHTML=`
<div class="today-header">
<div>BOSS</div><div>STATUS</div><div>RESPAWN</div><div>COUNTDOWN</div><div>TOD</div><div></div>
</div>`;

todayList.sort((a,b)=>a.time-b.time);

todayList.forEach(b=>{
    box.innerHTML+=`
    <div class="today-row">
        <div class="name">${b.name}</div>
        <div class="status today">TODAY</div>
        <div>${format(b.time)}</div>
        <div>${cd(b.time)}</div>
        <div>${loadTOD(b.name)||"--"}</div>
        <div></div>
    </div>`;
});

}

setInterval(update,1000);

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyC9b8i1-UptVKW1Jh98_rgMY0tbvfDziio",
  authDomain: "boss-timer-803c1.firebaseapp.com",
  databaseURL: "https://boss-timer-803c1-default-rtdb.firebaseio.com",
  projectId: "boss-timer-803c1",
};
storageBucket: "boss-timer-803c1.appspot.com",
  messagingSenderId: "584405925759",
  appId: "1:584405925759:web:9356c4d41c58bf181644a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("bosses").on("value", snapshot => {
    bossData = snapshot.val() || {};
    update();
});

db.ref("bossesDead").on("value", snapshot => {
    bossDead = snapshot.val() || {};
    update();
});
</script>
</body>
</html>
