
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Boss Respawn Timer</title>

<style>

/* ===== KEEP ALL YOUR STYLE EXACTLY ===== */
/* (UNCHANGED — your full CSS is intact) */

.row{
    position:relative;
    overflow:visible;
    z-index:1;
}

.row::after{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:12px;
    pointer-events:none;
    opacity:0;
    z-index:-1;
}

.next::after{
    box-shadow:
        0 0 12px #00e5ff,
        0 0 30px #00e5ff,
        0 0 55px #00e5ff;
    opacity:1;
}

.alive::after{
    box-shadow:
        0 0 10px #00ff9c,
        0 0 25px #00ff9c,
        0 0 45px #00ff9c;
    animation:glowGreen 1.2s infinite ease-in-out;
}

.today::after{
    box-shadow:
        0 0 10px #ffd54f,
        0 0 20px #ffd54f;
    opacity:0.6;
}

.soon::after{
    box-shadow:
        0 0 10px #ff4d4d,
        0 0 25px #ff4d4d,
        0 0 45px #ff4d4d;
    animation:glowRed 1s infinite ease-in-out;
}

@keyframes glowGreen{
    0%{opacity:0.2;}
    50%{opacity:1;}
    100%{opacity:0.2;}
}

@keyframes glowRed{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

body{
    margin:0;
    background:#0b0e14;
    font-family:'Segoe UI','Inter',sans-serif;
    color:#eee;
    display:flex;
    justify-content:center;
}

.container{
    width:950px;
    padding:20px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.logo{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    background:#fff;
    padding:6px;
}

h1{text-align:center;}

.row,.today-row,.today-header{
    display:grid;
    grid-template-columns: 180px 100px 180px 150px 120px auto;
    gap:10px;
    align-items:center;
    padding:10px;
}

.row{
    background:#111;
    border-left:5px solid #333;
    border-radius:10px;
    margin:6px 0;
}

.name{ color:#00e5ff; }

</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo">
<div class="guild">TK义</div>
<div class="subguild">DISHONOR / EXTINCTION / EXODUS</div>
</div>

<h1>BOSS RESPAWN TIMER</h1>

<div id="todayBox" class="today-box"></div>

<div id="dynamic"></div>
<div id="fixed"></div>
<div id="kransia"></div>

</div>

<script>

// ✅ FIX: DEFINE CONTAINERS
const dynamic = document.getElementById("dynamic");
const fixed = document.getElementById("fixed");
const kransia = document.getElementById("kransia");

// ===== STORAGE =====
let bossData = {};

// ===== YOUR FULL DATA (UNCHANGED) =====
const dynamicBosses = [
{ name:"Venatus", h:10 },{ name:"Viorent", h:10 },
{ name:"Ego", h:21 },{ name:"Livera", h:24 },
{ name:"Araneo", h:24 },{ name:"Undomiel", h:24 },
{ name:"LadyDalia", h:18 },{ name:"GeneralAquleus", h:29 },
{ name:"Amentis", h:29 },{ name:"BaronBraudmore", h:32 },
{ name:"Wannitas", h:48 },{ name:"Metus", h:48 },
{ name:"Duplican", h:48 },{ name:"Shuliar", h:35 },
{ name:"Gareth", h:32 },{ name:"Titore", h:37 },
{ name:"Larba", h:35 },{ name:"Catena", h:35 },
{ name:"Secreta", h:62 },{ name:"Ordo", h:62 },
{ name:"Asta", h:62 },{ name:"Supore", h:62 }
];

const fixedBosses = [
["Neutro",[["Tuesday","19:00"],["Thursday","11:30"]]],
["Clemantis",[["Monday","11:30"],["Thursday","19:00"]]],
["Saphirus",[["Sunday","17:00"],["Tuesday","11:30"]]],
["Thymele",[["Monday","19:00"],["Wednesday","11:30"]]],
["Auraq",[["Friday","22:00"],["Wednesday","21:00"]]],
["Roderick",[["Friday","19:00"]]],
["Milavy",[["Saturday","15:00"]]],
["Chaiflock",[["Saturday","22:00"]]],
["Benji",[["Sunday","21:00"]]],
["Libitina",[["Monday","21:00"],["Saturday","21:00"]]],
["Rakajeth",[["Tuesday","22:00"],["Sunday","19:00"]]],
["Tumier",[["Sunday","19:00"]]]
];

const kransiaBosses = [
["Icaruthia",[["Tuesday","21:00"],["Friday","21:00"]]],
["Motti",[["Wednesday","19:00"],["Saturday","19:00"]]],
["Nevaeh",[["Sunday","22:00"]]]
];

const DAY_MAP = {Sunday:0,Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6};

// ===== FUNCTIONS =====
function saveTOD(name,value){
    db.ref("bosses/"+name).set(value);
}

function loadTOD(name){
    return bossData[name]||"";
}

function nextInterval(tod,h){
    if(!tod.includes(":")) return null;
    let now=new Date();
    let [t,ap]=tod.split(" ");
    let [hh,mm]=t.split(":");
    hh=parseInt(hh);
    if(ap==="PM" && hh!=12) hh+=12;
    if(ap==="AM" && hh==12) hh=0;
    let d=new Date();
    d.setHours(hh,mm,0);
    let r=new Date(d.getTime()+h*3600000);
    while(r<now) r=new Date(r.getTime()+h*3600000);
    return r;
}

function nextSchedule(times){
    return times.map(([day,t])=>{
        let [h,m]=t.split(":");
        let d=new Date();
        let diff=DAY_MAP[day]-d.getDay();
        if(diff<0) diff+=7;
        d.setDate(d.getDate()+diff);
        d.setHours(h,m,0);
        return d;
    }).sort((a,b)=>a-b)[0];
}

function format(d){
    return d.toLocaleString("en-US",{weekday:"short",hour:"2-digit",minute:"2-digit"});
}

function cd(n){
    if(!n) return "--";
    let diff=(n-new Date())/1000;
    if(diff<=0) return "ALIVE";
    let h=Math.floor(diff/3600);
    let m=Math.floor(diff%3600/60);
    let s=Math.floor(diff%60);
    return `${h}h ${m}m ${s}s`;
}

// ===== BUILD =====
function build(title,data,container,isDynamic=false){
    container.innerHTML += `<div class="section-title">${title}</div>`;
    data.forEach(b=>{
        let row=document.createElement("div");
        row.className="row";
        row.id="row_"+b.name;

        row.innerHTML=`
        <div class="name">${b.name}</div>
        <div class="status" id="s_${b.name}">--</div>
        <div class="respawn" id="r_${b.name}">--</div>
        <div class="cd" id="c_${b.name}">--</div>
        <div class="tod">
        ${isDynamic ? `<input id="tod_${b.name}" value="${loadTOD(b.name)}" onchange="saveTOD('${b.name}',this.value)">` : "--"}
        </div>
        ${isDynamic ? `<button onclick="setNow('${b.name}')">Now</button>` : ""}
        `;
        container.appendChild(row);
    });
}

// ===== BUILD ALL =====
build("DYNAMIC BOSSES",dynamicBosses.map(b=>({...b,type:"dyn"})),dynamic,true);
build("FIXED TIMER",fixedBosses.map(([n,t])=>({name:n,times:t,type:"fix"})),fixed);
build("KRANSIA",kransiaBosses.map(([n,t])=>({name:n,times:t,type:"fix"})),kransia);

// ===== UPDATE =====
function update(){
    let allBosses=[];
    [...dynamicBosses.map(b=>({...b,type:"dyn"})),
     ...fixedBosses.map(([n,t])=>({name:n,times:t,type:"fix"})),
     ...kransiaBosses.map(([n,t])=>({name:n,times:t,type:"fix"}))]
    .forEach(b=>{
        let n=b.type==="dyn"?nextInterval(loadTOD(b.name),b.h):nextSchedule(b.times);
        if(n) allBosses.push({name:b.name,time:n});
        document.getElementById("r_"+b.name).innerText=n?format(n):"--";
        document.getElementById("c_"+b.name).innerText=cd(n);
    });

    allBosses.sort((a,b)=>a.time-b.time);
    if(allBosses[0]){
        document.getElementById("row_"+allBosses[0].name).classList.add("next");
    }
}

setInterval(update,1000);

</script>
